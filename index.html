<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 KR Market Closing Briefing</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e8ecf1;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    max-width: 800px;
    width: 100%;
    padding: 40px 48px 36px;
  }
  .header {
    text-align: center;
    padding-bottom: 24px;
    border-bottom: 3px solid #1a1a2e;
    margin-bottom: 28px;
  }
  .header h1 { font-size: 28px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: #7a8a9e; margin-top: 8px; }
  .list { }
  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f6f8fa;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .item:hover { background: #eef2f7; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .item.new { border-left: 3px solid #dc2626; }
  .item-date { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .item-sub { font-size: 11px; color: #7a8a9e; margin-top: 3px; }
  .badge-new {
    background: #dc2626;
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .badge-link {
    color: #2563eb;
    font-size: 12px;
    font-weight: 600;
  }
  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: #94a3b8;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🇰🇷 KR Market Closing Briefing</h1>
    <p>매일 오후 5시 — 한국 시장 장 마감 요약 브리핑 (IB 스타일 3페이지 A4)</p>
  </div>

  <div class="list" id="briefing-list"></div>

  <div class="footer">
    ⚠️ 자동 생성 브리핑 — 투자 권유가 아닙니다 &nbsp;|&nbsp; Data: Yahoo Finance (yfinance)
  </div>
</div>

<script>
const b = [
  { d: "2026-04-06", label: "2026년 4월 6일 (월)", sub: "4/6 마감 — KOSPI +1.36% 3일 연속 반등 / KOSDAQ -1.54% / 원달러 1,501원 / 삼성전자 +3.71% 실적 D-1 / 이란 시한 D-day", n: true },
  { d: "2026-04-03", label: "2026년 4월 3일 (금)", sub: "4/3 마감 — KOSPI +2.74% 반등 지속 / KOSDAQ +0.70% / 원달러 1,508원 / 조선·방산 급등 / WTI $111 급등", n: false },
  { d: "2026-04-02", label: "2026년 4월 2일 (목)", sub: "4/2 마감 — KOSPI -4.47% 급락 / KOSDAQ -5.36% / 원달러 1,515원 / 트럼프 연설 실망 → 종전 랠리 되돌림", n: false },
  { d: "2026-04-01", label: "2026년 4월 1일 (수)", sub: "4/1 마감 — KOSPI +8.44% 역대 2위 폭등 / KOSDAQ +6.06% / 원달러 1,506원 / 반도체 랠리", n: false },
  { d: "2026-03-31", label: "2026년 3월 31일 (화)", sub: "3/31 마감 — KOSPI -4.26% 급락 / KOSDAQ -4.94% / 원달러 1,530원 / 이란·반도체 이중 충격", n: false },
];

const list = document.getElementById('briefing-list');
b.forEach(item => {
  const a = document.createElement('a');
  a.className = 'item' + (item.n ? ' new' : '');
  a.href = `briefings/kr-market-closing-${item.d}.html`;
  a.innerHTML = `
    <div>
      <div class="item-date">${item.label}</div>
      <div class="item-sub">${item.sub}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      ${item.n ? '<span class="badge-new">NEW</span>' : ''}
      <span class="badge-link">브리핑 보기 →</span>
    </div>
  `;
  list.appendChild(a);
});
</script>
</body>
</html>
